<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-code-4j · Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
/* ── Linear Design System Tokens ── */
:root {
  /* Backgrounds */
  --bg-page:   #08090a;
  --bg-panel:  #0f1011;
  --bg-surface:#191a1b;
  --bg-hover:  #28282c;

  /* Text */
  --t1: #f7f8f8;
  --t2: #d0d6e0;
  --t3: #8a8f98;
  --t4: #62666d;

  /* Brand */
  --brand:      #5e6ad2;
  --accent:     #7170ff;
  --accent-h:   #828fff;

  /* Status */
  --ok:    #10b981;
  --warn:  #f59e0b;
  --err:   #f87171;

  /* Borders */
  --b-std:    rgba(255,255,255,0.08);
  --b-sub:    rgba(255,255,255,0.05);
  --b-solid:  #23252a;

  /* Accent tints */
  --brand-tint:   rgba(94,106,210,0.10);
  --brand-border: rgba(94,106,210,0.20);
  --ok-tint:      rgba(16,185,129,0.10);
  --ok-border:    rgba(16,185,129,0.20);
  --warn-tint:    rgba(245,158,11,0.10);
  --warn-border:  rgba(245,158,11,0.20);
  --err-tint:     rgba(248,113,113,0.10);
  --err-border:   rgba(248,113,113,0.20);

  /* Typography */
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: ui-monospace, 'SF Mono', Menlo, monospace;
  --feat: "cv01", "ss03";

  /* Easing */
  --ease: cubic-bezier(0.16,1,0.3,1);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg-page);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  font-weight: 400;
  font-feature-settings: var(--feat);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Topbar ── */
.topbar {
  height: 48px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--b-sub);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.wordmark {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 510;
  color: var(--t1);
  letter-spacing: -0.13px;
  font-feature-settings: var(--feat);
  display: flex;
  align-items: center;
  gap: 6px;
}
.wordmark-logo {
  width: 18px;
  height: 18px;
  background: var(--brand);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.wordmark-logo svg { width: 10px; height: 10px; }
.wordmark-slash { color: var(--t4); font-weight: 400; }
.wordmark-page { color: var(--t3); font-weight: 400; }

.tb-sep { width: 1px; height: 16px; background: var(--b-std); flex-shrink: 0; }

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px 3px 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--b-std);
  border-radius: 9999px;
  font-size: 12px;
  font-weight: 510;
  color: var(--t3);
  font-feature-settings: var(--feat);
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ok);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.busy { background: var(--warn); animation: pulse 1.2s ease infinite; }
.status-dot.err  { background: var(--err); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
@keyframes spin   { to{transform:rotate(360deg)} }
@keyframes blink  { 50%{opacity:0} }

.tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.token-info {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--t4);
  font-feature-settings: var(--feat);
}
.token-bar-wrap {
  width: 48px;
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 1px;
  overflow: hidden;
}
.token-bar {
  height: 100%;
  width: 0%;
  background: var(--brand);
  border-radius: 1px;
  transition: width 0.4s var(--ease);
}

.btn-new {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--b-std);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 510;
  font-feature-settings: var(--feat);
  color: var(--t2);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-new:hover {
  background: rgba(255,255,255,0.05);
  border-color: var(--b-std);
  color: var(--t1);
}
.btn-new svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  height: calc(100vh - 48px);
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  background: var(--bg-panel);
  border-right: 1px solid var(--b-sub);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-head {
  padding: 16px 12px 8px;
  font-size: 11px;
  font-weight: 510;
  font-feature-settings: var(--feat);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--t4);
}
.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 6px 12px;
}
.session-list::-webkit-scrollbar { width: 3px; }
.session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.session-item {
  padding: 7px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
  margin-bottom: 1px;
}
.session-item:hover { background: rgba(255,255,255,0.03); }
.session-item.active { background: var(--brand-tint); }

.si-title {
  font-size: 13px;
  font-weight: 400;
  font-feature-settings: var(--feat);
  color: var(--t2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.13px;
}
.session-item.active .si-title { color: var(--accent); font-weight: 510; }
.si-time {
  font-size: 11px;
  color: var(--t4);
  margin-top: 1px;
  font-feature-settings: var(--feat);
}

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#errBanner {
  display: none;
  background: var(--err-tint);
  border-bottom: 1px solid var(--err-border);
  padding: 7px 24px;
  font-size: 12px;
  font-weight: 510;
  font-feature-settings: var(--feat);
  color: var(--err);
  text-align: center;
}

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0 12px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 2px; }

.msg-wrap { max-width: 720px; margin: 0 auto; padding: 0 24px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  text-align: center;
  color: var(--t4);
}
.empty-icon {
  width: 40px;
  height: 40px;
  background: var(--brand);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
.empty-icon svg { width: 20px; height: 20px; }
.empty-title {
  font-size: 15px;
  font-weight: 510;
  font-feature-settings: var(--feat);
  color: var(--t2);
  letter-spacing: -0.165px;
  margin-bottom: 6px;
}
.empty-sub {
  font-size: 13px;
  color: var(--t4);
  font-feature-settings: var(--feat);
  letter-spacing: -0.13px;
}

/* ── User message ── */
.msg-user {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 16px;
}
.user-bubble {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--b-std);
  border-radius: 12px 12px 2px 12px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 400;
  font-feature-settings: var(--feat);
  color: var(--t1);
  max-width: 68%;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  letter-spacing: -0.182px;
}

/* ── AI message ── */
.msg-ai {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  align-items: flex-start;
}
.ai-avatar {
  width: 24px;
  height: 24px;
  background: var(--brand);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 3px;
}
.ai-avatar svg { width: 12px; height: 12px; }
.ai-body { flex: 1; min-width: 0; }

/* ── Think block ── */
.think-block {
  border: 1px solid var(--brand-border);
  border-radius: 8px;
  margin-bottom: 6px;
  overflow: hidden;
  background: var(--brand-tint);
}
.think-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 11px;
  cursor: pointer;
  user-select: none;
}
.think-spinner {
  width: 12px;
  height: 12px;
  border: 1.5px solid var(--brand-border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
.think-check {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--ok-tint);
  border: 1px solid var(--ok-border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.think-check svg { width: 7px; height: 7px; }
.think-label {
  font-size: 12px;
  font-weight: 510;
  font-feature-settings: var(--feat);
  color: var(--accent);
}
.think-label.done { color: var(--t4); font-weight: 400; }
.think-dur { font-size: 11px; color: var(--t4); font-family: var(--mono); }
.think-toggle { margin-left: auto; color: var(--t4); transition: transform 0.2s; }
.think-block.open .think-toggle { transform: rotate(180deg); }
.think-body {
  padding: 0 11px 9px;
  font-size: 12.5px;
  color: var(--t3);
  line-height: 1.75;
  font-style: italic;
  border-top: 1px solid var(--brand-border);
  display: none;
}
.think-block.open .think-body { display: block; padding-top: 8px; }

/* ── Tool block ── */
.tool-block {
  border: 1px solid var(--b-std);
  border-radius: 8px;
  margin-bottom: 6px;
  overflow: hidden;
  background: rgba(255,255,255,0.01);
}
.tool-block.running { border-color: var(--warn-border); background: var(--warn-tint); }
.tool-block.done    { border-color: var(--ok-border); }
.tool-block.failed  { border-color: var(--err-border); }

.tool-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 11px;
  cursor: pointer;
  user-select: none;
}
.tool-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tool-dot.running { background: var(--warn); box-shadow: 0 0 5px var(--warn); animation: pulse 1.2s ease infinite; }
.tool-dot.done    { background: var(--ok); }
.tool-dot.failed  { background: var(--err); }

.tool-fn {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t3);
}
.tool-block.running .tool-fn { color: var(--warn); }
.tool-block.done    .tool-fn { color: var(--ok); }
.tool-block.failed  .tool-fn { color: var(--err); }

.tool-status { font-size: 11px; color: var(--t4); }
.tool-toggle { margin-left: auto; color: var(--t4); transition: transform 0.2s; }
.tool-block.open .tool-toggle { transform: rotate(180deg); }

.tool-body {
  border-top: 1px solid var(--b-sub);
  padding: 7px 11px 9px;
  display: none;
}
.tool-block.open .tool-body { display: block; }

.tool-label {
  font-size: 10px;
  font-weight: 510;
  font-feature-settings: var(--feat);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--t4);
  margin-bottom: 4px;
}
.tool-label.in  { color: rgba(245,158,11,0.6); }
.tool-label.out { color: rgba(16,185,129,0.6); }
.tool-label.err { color: rgba(248,113,113,0.6); }

.tool-code {
  background: var(--bg-page);
  border: 1px solid var(--b-sub);
  border-radius: 6px;
  padding: 6px 9px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--t3);
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
  margin-bottom: 6px;
  max-height: 180px;
  overflow-y: auto;
}
.tool-code:last-child { margin-bottom: 0; }
.tool-code::-webkit-scrollbar { width: 3px; }
.tool-code::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

/* ── AI text ── */
.ai-text {
  font-size: 14px;
  font-weight: 400;
  font-feature-settings: var(--feat);
  color: var(--t1);
  line-height: 1.75;
  letter-spacing: -0.182px;
  margin-top: 2px;
}
.ai-text code {
  font-family: var(--mono);
  font-size: 12.5px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--b-std);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--accent);
}
.cursor {
  display: inline-block;
  width: 2px;
  height: 13px;
  background: var(--accent);
  border-radius: 1px;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 1px;
}

/* ── Input area ── */
.input-wrap {
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
  padding: 6px 24px 20px;
}
.conn-status {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 6px;
  padding: 0 2px;
}
.conn-text {
  font-size: 11px;
  font-weight: 400;
  font-feature-settings: var(--feat);
  color: var(--t4);
}

.input-box {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--b-std);
  border-radius: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: hidden;
}
.input-box:focus-within {
  border-color: rgba(113,112,255,0.3);
  box-shadow: 0 0 0 3px rgba(113,112,255,0.07);
}

.input-row {
  display: flex;
  align-items: flex-end;
  padding: 10px 10px 8px 14px;
  gap: 8px;
}
textarea#msgInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 400;
  font-feature-settings: var(--feat);
  color: var(--t1);
  line-height: 1.55;
  min-height: 22px;
  max-height: 140px;
  letter-spacing: -0.182px;
}
textarea#msgInput::placeholder { color: var(--t4); }

.send-btn {
  width: 30px;
  height: 30px;
  background: var(--brand);
  border: none;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, box-shadow 0.15s;
  color: #fff;
}
.send-btn:hover { background: var(--accent); box-shadow: 0 0 12px rgba(113,112,255,0.35); }
.send-btn:disabled { background: rgba(255,255,255,0.06); cursor: not-allowed; box-shadow: none; }
.send-btn svg { width: 13px; height: 13px; }

.input-footer {
  display: flex;
  align-items: center;
  padding: 0 12px 8px;
  gap: 4px;
}
.kbd {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--t4);
  padding: 1px 5px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--b-sub);
  border-radius: 4px;
}
.input-hint {
  font-size: 11px;
  font-feature-settings: var(--feat);
  color: var(--t4);
  margin-left: auto;
}

/* ── Markdown rendered content ── */
.ai-text p { margin: 0 0 10px; }
.ai-text p:last-child { margin-bottom: 0; }
.ai-text h1,.ai-text h2,.ai-text h3,.ai-text h4 {
  font-weight: 590; font-feature-settings: var(--feat);
  letter-spacing: -0.24px; margin: 14px 0 6px; color: var(--t1);
}
.ai-text h1 { font-size: 18px; }
.ai-text h2 { font-size: 16px; }
.ai-text h3,.ai-text h4 { font-size: 14px; }
.ai-text ul,.ai-text ol { padding-left: 20px; margin: 6px 0 10px; }
.ai-text li { margin-bottom: 3px; }
.ai-text pre {
  background: var(--bg-page); border: 1px solid var(--b-std);
  border-radius: 6px; padding: 10px 12px; overflow-x: auto;
  margin: 8px 0; font-family: var(--mono); font-size: 12px;
  color: var(--t2); line-height: 1.6;
}
.ai-text pre::-webkit-scrollbar { height: 3px; }
.ai-text pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.ai-text pre code { background: none; border: none; padding: 0; font-size: inherit; color: inherit; }
.ai-text blockquote {
  border-left: 2px solid var(--brand); margin: 8px 0;
  padding: 4px 0 4px 12px; color: var(--t3);
}
.ai-text hr { border: none; border-top: 1px solid var(--b-sub); margin: 12px 0; }
.ai-text a { color: var(--accent); text-decoration: none; }
.ai-text a:hover { text-decoration: underline; }
.ai-text strong { font-weight: 590; color: var(--t1); }
.ai-text em { font-style: italic; color: var(--t2); }
.ai-text table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
.ai-text th,.ai-text td { border: 1px solid var(--b-std); padding: 6px 10px; text-align: left; }
.ai-text th { background: rgba(255,255,255,0.03); font-weight: 510; color: var(--t2); }

/* ── Teammate Status Card (slim, replaces old workspace-card) ── */
.tm-status-card {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  padding: 7px 10px;
  border: 1px solid rgba(113,112,255,0.18);
  border-radius: 8px;
  background: rgba(94,106,210,0.04);
}
.tm-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent);
  box-shadow: 0 0 5px rgba(113,112,255,0.5);
  animation: pulse 1.2s ease infinite;
}
.tm-dot.done { background: var(--ok); box-shadow: 0 0 5px rgba(16,185,129,0.4); animation: none; }
.tm-name { font-size: 12px; font-weight: 590; color: var(--accent); font-feature-settings: var(--feat); }
.tm-status { font-size: 11px; color: var(--t3); font-feature-settings: var(--feat); }
.tm-count { font-size: 11px; color: var(--t4); font-family: var(--mono); margin-left: auto; flex-shrink: 0; }
.tm-btn {
  flex-shrink: 0;
  font-size: 11px; font-weight: 510; font-feature-settings: var(--feat);
  color: var(--accent); background: none; border: none; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  transition: background 0.15s;
  display: none;
}
.tm-btn:hover { background: var(--brand-tint); }
.tm-btn.visible { display: block; }

/* ── Compact Card (slim) ── */
.compact-card {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  padding: 7px 10px;
  border: 1px solid rgba(94,106,210,0.25);
  border-radius: 8px;
  background: rgba(94,106,210,0.06);
}
.compact-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--brand); }
.compact-title { font-size: 12px; font-weight: 590; color: var(--brand); font-feature-settings: var(--feat); letter-spacing: -0.12px; flex-shrink: 0; }
.compact-preview { font-size: 11px; color: var(--t4); font-family: var(--mono); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.compact-btn {
  flex-shrink: 0;
  font-size: 11px; font-weight: 510; font-feature-settings: var(--feat);
  color: var(--brand); background: none; border: none; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  transition: background 0.15s;
}
.compact-btn:hover { background: var(--brand-tint); }

/* ── Workspace Drawer ── */
.workspace-drawer {
  position: fixed; right: 0; top: 48px; bottom: 0;
  width: 440px;
  background: var(--bg-panel);
  border-left: 1px solid var(--b-sub);
  transform: translateX(100%);
  transition: transform 0.25s var(--ease);
  display: flex; flex-direction: column; z-index: 100;
}
.workspace-drawer.open { transform: translateX(0); }
.layout { transition: margin-right 0.25s var(--ease); }
.drawer-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--b-sub);
  flex-shrink: 0;
}
.drawer-title { font-size: 13px; font-weight: 510; color: var(--t1); font-feature-settings: var(--feat); flex: 1; }
.drawer-close {
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; color: var(--t3);
  border-radius: 4px; font-size: 14px; transition: background 0.15s, color 0.15s;
}
.drawer-close:hover { background: rgba(255,255,255,0.06); color: var(--t1); }
.drawer-tabs {
  display: flex; gap: 2px; padding: 8px 12px 0;
  border-bottom: 1px solid var(--b-sub);
  flex-shrink: 0;
  overflow-x: auto;
}
.drawer-tabs::-webkit-scrollbar { display: none; }
.drawer-tab {
  padding: 5px 10px 7px;
  font-size: 12px; font-weight: 510; font-feature-settings: var(--feat);
  color: var(--t3); background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s;
  white-space: nowrap;
}
.drawer-tab:hover { color: var(--t1); }
.drawer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.drawer-content {
  flex: 1; overflow-y: auto; padding: 12px 16px;
}
.drawer-content::-webkit-scrollbar { width: 4px; }
.drawer-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

/* ── Mini message list (inside drawer) ── */
.mini-user { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.mini-user-bubble {
  background: rgba(255,255,255,0.04); border: 1px solid var(--b-std);
  border-radius: 8px 8px 2px 8px; padding: 6px 10px;
  font-size: 12px; color: var(--t2); max-width: 80%;
  white-space: pre-wrap; word-break: break-word;
}
.mini-ai { margin-bottom: 8px; }
.mini-ai-text {
  font-size: 12.5px; color: var(--t2); line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; margin-top: 4px;
}
/* Mini tool block — collapsible, with input/output detail */
.mini-tool-block {
  border: 1px solid var(--b-std); border-radius: 6px;
  background: rgba(255,255,255,0.01); margin: 3px 0; overflow: hidden;
}
.mini-tool-header {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; cursor: pointer; user-select: none;
  transition: background 0.12s;
}
.mini-tool-header:hover { background: rgba(255,255,255,0.03); }
.mini-tool-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
.mini-tool-fn { font-family: var(--mono); font-size: 11.5px; color: var(--ok); }
.mini-tool-toggle { margin-left: auto; font-size: 10px; color: var(--t4); transition: transform 0.2s; }
.mini-tool-block.open .mini-tool-toggle { transform: rotate(180deg); }
.mini-tool-body {
  border-top: 1px solid var(--b-sub); padding: 6px 8px; display: none;
}
.mini-tool-block.open .mini-tool-body { display: block; }
.mini-tool-label {
  font-size: 10px; font-weight: 510; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--t4); margin-bottom: 3px;
}
.mini-tool-label.out { color: rgba(16,185,129,0.6); }
.mini-tool-code {
  background: var(--bg-page); border: 1px solid var(--b-sub); border-radius: 4px;
  padding: 4px 7px; font-family: var(--mono); font-size: 11px; color: var(--t3);
  white-space: pre-wrap; word-break: break-all; line-height: 1.55;
  max-height: 150px; overflow-y: auto; margin-bottom: 5px;
}
.mini-tool-code:last-child { margin-bottom: 0; }
.mini-tool-code::-webkit-scrollbar { width: 3px; }
.mini-tool-code::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

/* ── Responsive ── */
@media (max-width:640px) {
  .sidebar { display: none; }
  .wordmark-page { display: none; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="wordmark">
    <div class="wordmark-logo">
      <svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2l1.8 3.6L14 6.5l-3 2.9.7 4.1L8 11.5l-3.7 1.9.7-4.1L2 6.5l4.2-.9z"/>
      </svg>
    </div>
    claude-code-4j
    <span class="wordmark-slash">/</span>
    <span class="wordmark-page">Playground</span>
  </div>

  <div class="tb-sep"></div>

  <div class="status-pill">

    <span id="connText">就绪</span>
  </div>

  <div class="tb-right">
    <div class="token-info">
      <div class="token-bar-wrap"><div class="token-bar" id="tokenBar"></div></div>
      <span id="tokenText" style="font-family:var(--mono);font-size:11px;">—</span>
    </div>
    <button class="btn-new" id="btnNew">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">

      新对话

</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">对话历史</div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="errBanner">连接已断开，请刷新重试</div>

    <div class="messages" id="messages">
      <div class="msg-wrap" id="msgWrap">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 2l2.3 4.6L18 7.6l-4 3.9.9 5.5L10 14.5l-4.9 2.5.9-5.5-4-3.9 5.7-.9z"/>
            </svg>
          </div>
          <div class="empty-title">claude-code-4j Agent</div>
          <div class="empty-sub">发送消息开始与 Agent 对话</div>
        </div>
      </div>
    </div>

    <div class="input-wrap">
      <div class="conn-status">
        <span class="conn-text" id="connSubText"></span>
      </div>
      <div class="input-box">
        <div class="input-row">
          <textarea id="msgInput" placeholder="发消息给 Agent…" rows="1"></textarea>
          <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 13V3M4 7l4-4 4 4"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="kbd">Enter</span>
          <span style="font-size:11px;color:var(--t4);margin-left:2px">发送</span>
          <span class="kbd" style="margin-left:8px">Shift+Enter</span>
          <span style="font-size:11px;color:var(--t4);margin-left:2px">换行</span>
          <span class="input-hint">Agent 可读写文件 · 执行命令</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Workspace Drawer (right side) -->
<div class="workspace-drawer" id="workspaceDrawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle">工作空间</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-tabs" id="drawerTabs"></div>
  <div class="drawer-content" id="drawerContent"></div>
</div>

<script>
/* ── Markdown renderer ── */
function renderMarkdown(text) {
  if (typeof marked === 'undefined' || !text) return escHtml(text || '').replace(/\n/g, '<br>');
  try {
    return marked.parse(text, { breaks: true, gfm: true });
  } catch(e) {
    return escHtml(text).replace(/\n/g, '<br>');
  }
}

/* ── Think block header HTML ── */
function thinkHeaderHtml(label) {
  return `<div class="think-header" onclick="this.parentElement.classList.toggle('open')">
    <div class="think-check"><svg viewBox="0 0 8 8" fill="none" stroke="var(--ok)" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 4l2 2 3-3"/></svg></div>
    <span class="think-label done">${escHtml(label)}</span>
    <span class="think-toggle"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4l3 3 3-3"/></svg></span>
  </div>
  <div class="think-body"></div>`;
}

/* ── State ── */
let sessionId = null;
let streaming  = false;
let retries    = 0;
const MAX_RETRY = 3;

/* ── DOM refs ── */
const msgWrap      = document.getElementById('msgWrap');
const messages     = document.getElementById('messages');
const msgInput     = document.getElementById('msgInput');
const sendBtn      = document.getElementById('sendBtn');
const connPip      = document.getElementById('connPip');
const connText     = document.getElementById('connText');
const connSubText  = document.getElementById('connSubText');
const sessionList  = document.getElementById('sessionList');
const errBanner    = document.getElementById('errBanner');
const emptyState   = document.getElementById('emptyState');

/* ── Textarea auto-resize ── */
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
});

/* ── Key handlers ── */
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);
document.getElementById('btnNew').addEventListener('click', newConversation);

/* ── Helpers ── */
function setStatus(state, text) {
  connPip.className = 'status-dot' + (state === 'busy' ? ' busy' : state === 'err' ? ' err' : '');
  connText.textContent = state === 'busy' ? '运行中' : state === 'err' ? '错误' : '就绪';
  connSubText.textContent = text || '';
}

function setInputDisabled(disabled) {
  msgInput.disabled = disabled;
  sendBtn.disabled  = disabled;
}

function scrollBottom() {
  messages.scrollTop = messages.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hideEmpty() {
  if (emptyState) emptyState.style.display = 'none';
}

/* ── Append user bubble ── */
function appendUserBubble(text) {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-user';
  const bubble = document.createElement('div');
  bubble.className = 'user-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  msgWrap.appendChild(row);
  scrollBottom();
}

/* ── Append AI row, returns ai-body div ── */
function appendAiRow() {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-ai';
  row.innerHTML = `
    <div class="ai-avatar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2l1.8 3.6L14 6.5l-3 2.9.7 4.1L8 11.5l-3.7 1.9.7-4.1L2 6.5l4.2-.9z"/>
      </svg>
    </div>
    <div class="ai-body"></div>`;
  msgWrap.appendChild(row);
  scrollBottom();
  return row.querySelector('.ai-body');
}

/* ── Teammate Status Card (slim) ── */
// agentId → { card, dotEl, statusEl, countEl, btnEl, toolCount }
const teammateMap = {};

function ensureTeammateStatusCard(agentId) {
  if (teammateMap[agentId]) return teammateMap[agentId];
  const card = document.createElement('div');
  card.className = 'tm-status-card';
  card.dataset.agentId = agentId;
  card.innerHTML = `
    <div class="tm-dot"></div>
    <span class="tm-name">${escHtml(agentId)}</span>
    <span class="tm-status"> · 正在工作...</span>
    <span class="tm-count"></span>
    <button class="tm-btn" onclick="openDrawer('teammate',{agentId:'${escHtml(agentId)}',sessionId:currentTeammateSessions['${escHtml(agentId)}']})">查看工作区 →</button>`;
  // Append directly to msgWrap so the card is always visible as a top-level row
  hideEmpty();
  msgWrap.appendChild(card);
  scrollBottom();
  teammateMap[agentId] = {
    card,
    dotEl:    card.querySelector('.tm-dot'),
    statusEl: card.querySelector('.tm-status'),
    countEl:  card.querySelector('.tm-count'),
    btnEl:    card.querySelector('.tm-btn'),
    toolCount: 0
  };
  return teammateMap[agentId];
}

function updateTeammateStatus(agentId, toolName) {
  const tm = ensureTeammateStatusCard(agentId);
  tm.statusEl.textContent = toolName ? ` · 执行 ${toolName}` : ' · 正在工作...';
}

function finishTeammateCard(agentId) {
  const tm = ensureTeammateStatusCard(agentId); // create card if not yet created
  tm.dotEl.className = 'tm-dot done';
  tm.statusEl.textContent = ' · 完成';
  const cnt = tm.toolCount;
  tm.countEl.textContent = cnt > 0 ? `（${cnt} 个工具）` : '';
  tm.btnEl.classList.add('visible');
}

// tracks agentId → teammate sessionId (set when team_done fires)
const currentTeammateSessions = {};

/* ── Compact Card (slim) ── */
function createCompactCard(summary, transcriptFile) {
  hideEmpty();
  const preview = (summary || 'Context compressed.').slice(0, 30) + '...';
  const card = document.createElement('div');
  card.className = 'compact-card';
  card.innerHTML = `
    <svg class="compact-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 4h12M4 8h8M6 12h4"/>
    </svg>
    <span class="compact-title">Context Compressed</span>
    <span class="compact-preview">${escHtml(preview)}</span>
    <button class="compact-btn">查看完整历史 →</button>`;
  const btn = card.querySelector('.compact-btn');
  btn.onclick = () => openDrawer('transcript', { transcriptFile, summary });
  msgWrap.appendChild(card);
  scrollBottom();
}

/* ── Workspace Drawer ── */
let drawerState = null;
let drawerActiveTmTab = null;
const drawer      = document.getElementById('workspaceDrawer');
const drawerTitle = document.getElementById('drawerTitle');
const drawerTabs  = document.getElementById('drawerTabs');
const drawerContent = document.getElementById('drawerContent');
const layout      = document.querySelector('.layout');

function openDrawer(type, data) {
  drawerState = { type, data };
  if (type === 'transcript') renderTranscriptDrawer(data);
  if (type === 'teammate')   renderTeammateDrawer(data);
  drawer.classList.add('open');
  layout.style.marginRight = '440px';
}

function closeDrawer() {
  drawer.classList.remove('open');
  layout.style.marginRight = '';
  drawerState = null;
}

async function renderTranscriptDrawer({ transcriptFile, summary }) {
  drawerTitle.textContent = '压缩前历史';
  drawerTabs.innerHTML = '';
  drawerContent.innerHTML = '<div style="color:var(--t4);font-size:12px">加载中...</div>';
  if (!transcriptFile) {
    drawerContent.innerHTML = `<div style="color:var(--t4);font-size:12px;white-space:pre-wrap">${escHtml(summary || '暂无详情')}</div>`;
    return;
  }
  try {
    const res = await fetch(`/api/transcripts/${encodeURIComponent(transcriptFile)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const msgs = await res.json();
    renderMiniMessages(drawerContent, msgs);
  } catch(e) {
    drawerContent.innerHTML = `<div style="color:var(--err);font-size:12px">加载失败: ${escHtml(e.message)}</div>`;
  }
}

async function renderTeammateDrawer({ agentId, sessionId: tmSessionId }) {
  drawerTitle.textContent = '工作空间';
  // Build tabs from all known teammates
  const allTms = Object.keys(currentTeammateSessions);
  drawerTabs.innerHTML = '';
  for (const id of allTms) {
    const tab = document.createElement('button');
    tab.className = 'drawer-tab' + (id === agentId ? ' active' : '');
    tab.textContent = id;
    tab.onclick = () => {
      drawerTabs.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      loadTeammateContent(id, currentTeammateSessions[id]);
    };
    drawerTabs.appendChild(tab);
  }
  const sid = tmSessionId || currentTeammateSessions[agentId];
  await loadTeammateContent(agentId, sid);
}

async function loadTeammateContent(agentId, tmSessionId) {
  drawerContent.innerHTML = '<div style="color:var(--t4);font-size:12px">加载中...</div>';
  if (!tmSessionId) {
    drawerContent.innerHTML = '<div style="color:var(--t4);font-size:12px">会话数据尚未保存</div>';
    return;
  }
  try {
    const res = await fetch(`/api/sessions/${encodeURIComponent(tmSessionId)}/messages`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const msgs = Array.isArray(json.messages) ? json.messages : [];
    renderMiniMessages(drawerContent, msgs);
  } catch(e) {
    drawerContent.innerHTML = `<div style="color:var(--err);font-size:12px">加载失败: ${escHtml(e.message)}</div>`;
  }
}

function renderMiniMessages(container, msgs) {
  container.innerHTML = '';
  // Build tool_call_id → result map for input/output display
  const toolResultMap = {};
  for (const msg of msgs) {
    if (msg.role === 'tool' && msg.tool_call_id) {
      toolResultMap[msg.tool_call_id] = msg._display_content || msg.content || '';
    }
  }
  for (const msg of msgs) {
    if (msg.role === 'tool') continue; // rendered via assistant tool_calls below
    if (msg.role === 'user' && typeof msg.content === 'string' && msg.content.includes('<system-reminder>')) continue;
    if (msg.role === 'user' && typeof msg.content === 'string' && msg.content.startsWith('[Context was compacted.')) {
      const el = document.createElement('div');
      el.style.cssText = 'font-size:11px;color:var(--brand);padding:6px 0;font-style:italic;';
      el.textContent = '[Context compressed here]';
      container.appendChild(el);
      continue;
    }
    if (msg.role === 'user' && typeof msg.content === 'string') {
      const div = document.createElement('div');
      div.className = 'mini-user';
      div.innerHTML = `<div class="mini-user-bubble">${escHtml(msg.content)}</div>`;
      container.appendChild(div);
    } else if (msg.role === 'assistant') {
      const text = typeof msg.content === 'string' ? msg.content : '';
      const toolCalls = Array.isArray(msg.tool_calls) ? msg.tool_calls : [];
      if (!text && toolCalls.length === 0) continue;
      const div = document.createElement('div');
      div.className = 'mini-ai';
      for (const tc of toolCalls) {
        const name = tc.function && tc.function.name ? tc.function.name : '?';
        let args = {};
        try { args = JSON.parse((tc.function && tc.function.arguments) || '{}'); } catch(e) {}
        const result = toolResultMap[tc.id] || '';
        const block = document.createElement('div');
        block.className = 'mini-tool-block';
        block.innerHTML = `
          <div class="mini-tool-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="mini-tool-dot"></span>
            <span class="mini-tool-fn">${escHtml(name)}</span>
            <span class="mini-tool-toggle">▾</span>
          </div>
          <div class="mini-tool-body">
            <div class="mini-tool-label">Input</div>
            <div class="mini-tool-code">${escHtml(JSON.stringify(args, null, 2))}</div>
            ${result ? `<div class="mini-tool-label out">Output</div><div class="mini-tool-code">${escHtml(result.slice(0, 3000))}${result.length > 3000 ? '\n…(truncated)' : ''}</div>` : ''}
          </div>`;
        div.appendChild(block);
      }
      if (text) {
        const el = document.createElement('div');
        el.className = 'mini-ai-text';
        el.textContent = text;
        div.appendChild(el);
      }
      container.appendChild(div);
    }
  }
  if (container.children.length === 0) {
    container.innerHTML = '<div style="color:var(--t4);font-size:12px">暂无内容</div>';
  }
}

/* ── Think block ── */
function createThinkBlock(aiBody) {
  const block = document.createElement('div');
  block.className = 'think-block open';
  block.innerHTML = `
    <div class="think-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="think-spinner"></div>
      <span class="think-label">正在思考...</span>
      <span class="think-toggle">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4l3 3 3-3"/></svg>
      </span>
    </div>
    <div class="think-body"></div>`;
  aiBody.appendChild(block);
  scrollBottom();
  return {
    block,
    body:      block.querySelector('.think-body'),
    spinnerEl: block.querySelector('.think-spinner'),
    label:     block.querySelector('.think-label')
  };
}

function finishThinkBlock(refs, durationMs) {
  const secs = (durationMs / 1000).toFixed(1);
  refs.spinnerEl.outerHTML = `<div class="think-check"><svg viewBox="0 0 8 8" fill="none" stroke="var(--ok)" stroke-width="1.5" stroke-linecap="round"><path d="M1.5 4l2 2 3-3"/></svg></div>`;
  refs.label.textContent = `已思考 ${secs}s`;
  refs.label.classList.add('done');
  refs.block.classList.remove('open');
}

/* ── Tool block ── */
function createToolBlock(aiBody, id, name, inputObj) {
  const block = document.createElement('div');
  block.className = 'tool-block running open';
  block.dataset.toolId = id;
  block.innerHTML = `
    <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="tool-dot running"></div>
      <span class="tool-fn">${escHtml(name)}</span>
      <span class="tool-status"> · 执行中</span>
      <span class="tool-toggle">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4l3 3 3-3"/></svg>
      </span>
    </div>
    <div class="tool-body">
      <div class="tool-label in">Input</div>
      <div class="tool-code">${escHtml(JSON.stringify(inputObj, null, 2))}</div>
    </div>`;
  aiBody.appendChild(block);
  scrollBottom();
}

function finishToolBlock(id, success, result) {
  const block = document.querySelector(`.tool-block[data-tool-id="${CSS.escape(id)}"]`);
  if (!block) return;
  const state = success ? 'done' : 'failed';
  block.className = `tool-block ${state}`;
  block.querySelector('.tool-dot').className = `tool-dot ${state}`;
  block.querySelector('.tool-status').textContent = success ? ' · 完成' : ' · 失败';

  const body = block.querySelector('.tool-body');
  const lbl = document.createElement('div');
  lbl.className = `tool-label ${success ? 'out' : 'err'}`;
  lbl.textContent = success ? 'Output' : 'Error';
  const code = document.createElement('div');
  code.className = 'tool-code';
  code.textContent = result;
  body.appendChild(lbl);
  body.appendChild(code);
  scrollBottom();
}

/* ── Send message ── */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || streaming) return;

  msgInput.value = '';
  msgInput.style.height = 'auto';
  setInputDisabled(true);
  streaming = true;
  retries   = 0;
  errBanner.style.display = 'none';
  // Clear teammate/workspace state for new round
  Object.keys(teammateMap).forEach(k => delete teammateMap[k]);
  Object.keys(currentTeammateSessions).forEach(k => delete currentTeammateSessions[k]);

  appendUserBubble(text);
  const aiBody = appendAiRow();

  setStatus('busy', '正在连接...');

  let thinkRefs    = null;
  let textEl       = null;
  let cursor       = null;
  let textEls      = [];   // all text elements in this response (for batch markdown render)
  let needNewTextEl = false; // set after tool_end / thinking_start so reply gets its own element

  function getOrCreateTextEl() {
    if (!textEl || needNewTextEl) {
      needNewTextEl = false;
      textEl = document.createElement('div');
      textEl.className = 'ai-text';
      cursor = document.createElement('span');
      cursor.className = 'cursor';
      textEl.appendChild(cursor);
      aiBody.appendChild(textEl);
      textEls.push(textEl);
    }
    return { textEl, cursor };
  }

  async function doStreamV2() {
    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setStatus('busy', '接收数据...');

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';
      let eventName = 'message';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('event:')) {
            eventName = line.substring(6).trim();
          } else if (line.startsWith('data:')) {
            const data = line.substring(5).trim();
            handleSseEvent(eventName, data);
            eventName = 'message';
          }
        }
      }

      finishStreaming();
    } catch (e) {
      if (retries < MAX_RETRY) {
        retries++;
        const delay = Math.pow(2, retries - 1) * 1000;
        setStatus('err', `连接断开，${delay/1000}s 后重试 (${retries}/${MAX_RETRY})...`);
        await new Promise(r => setTimeout(r, delay));
        aiBody.innerHTML = '';
        thinkRefs    = null;
        textEl       = null;
        cursor       = null;
        textEls      = [];
        needNewTextEl = false;
        await doStreamV2();
      } else {
        setStatus('err', '连接失败');
        errBanner.style.display = 'block';
        finishStreaming();
      }
    }
  }

  function handleSseEvent(evtName, data) {
    if (!data || data === '[DONE]') return;
    let payload;
    try { payload = JSON.parse(data); } catch { return; }

    switch (evtName) {
      case 'session_id':
        sessionId = payload.sessionId;
        setStatus('busy', `会话 ${sessionId.substring(0,8)}…`);
        break;

      case 'thinking_start':
        thinkRefs = createThinkBlock(aiBody);
        // If text was already emitted before thinking started (model sent content before reasoning),
        // the next text_delta should create a new element AFTER the think block, not reuse the old one.
        if (textEl) needNewTextEl = true;
        break;

      case 'thinking_text':
        if (thinkRefs) { thinkRefs.body.textContent += payload.text; scrollBottom(); }
        break;

      case 'thinking_end':
        if (thinkRefs) finishThinkBlock(thinkRefs, payload.duration_ms || 0);
        break;

      case 'tool_start':
        createToolBlock(aiBody, payload.id, payload.name, payload.input || {});
        break;

      case 'tool_end':
        finishToolBlock(payload.id, true, payload.result || '');
        // After a tool completes, the next text_delta is the final reply from the next LLM round.
        // It must appear AFTER this tool block, not reuse a textEl created before the tool.
        needNewTextEl = true;
        break;

      case 'tool_error':
        finishToolBlock(payload.id, false, payload.result || '');
        needNewTextEl = true;
        break;

      case 'text_delta': {
        const { textEl: el, cursor: cur } = getOrCreateTextEl();
        // Accumulate raw text for markdown rendering on completion
        el._rawText = (el._rawText || '') + payload.text;
        el.insertBefore(document.createTextNode(payload.text), cur);
        scrollBottom();
        break;
      }

      case 'done':
        if (payload && payload.usage) updateTokenMeter(payload.usage);
        if (cursor) { cursor.remove(); cursor = null; }
        // Re-render ALL accumulated text segments as markdown (there may be multiple textEls
        // when tool calls split the reply into interleaved text + final reply).
        for (const el of textEls) {
          if (el._rawText) el.innerHTML = renderMarkdown(el._rawText);
        }
        loadSessionList();
        break;

      case 'error':
        setStatus('err', payload.message || '未知错误');
        if (cursor) cursor.remove();
        finishStreaming();
        break;

      // ── Teammate status events ──
      case 'team_tool_start': {
        const tm = ensureTeammateStatusCard(payload.agentId);
        tm.toolCount++;
        tm.statusEl.textContent = ` · 执行 ${escHtml(payload.name || '...')}`;
        break;
      }

      case 'team_tool_end': {
        const tm = teammateMap[payload.agentId];
        if (tm) tm.statusEl.textContent = ` · 已完成 ${tm.toolCount} 个工具`;
        break;
      }

      case 'team_text': {
        const tm = teammateMap[payload.agentId];
        if (tm) tm.statusEl.textContent = ' · 正在输出...';
        break;
      }

      case 'team_done': {
        const agId = payload.agentId;
        // Build teammate sessionId = current sessionId + "-tm-" + agentId
        if (sessionId) currentTeammateSessions[agId] = sessionId + '-tm-' + agId;
        finishTeammateCard(agId);
        break;
      }

      // ── Compact card ──
      case 'compact_done':
        createCompactCard(payload.summary || '', payload.transcriptFile || null);
        break;
    }
  }

  function finishStreaming() {
    streaming = false;
    setInputDisabled(false);
    setStatus('', '');
    msgInput.focus();
  }

  await doStreamV2();
}

/* ── Token meter ── */
function updateTokenMeter(usage) {
  const total = (usage.prompt_tokens || usage.input_tokens || 0)
              + (usage.completion_tokens || usage.output_tokens || 0);
  const pct   = Math.min(100, (total / 128000) * 100);
  document.getElementById('tokenBar').style.width = pct + '%';
  document.getElementById('tokenText').textContent =
      total >= 1000 ? (total / 1000).toFixed(1) + 'k' : total + ' tok';
}

/* ── Session sidebar ── */
async function loadSessionList() {
  try {
    const res = await fetch('/api/sessions');
    if (!res.ok) return;
    const sessions = await res.json();
    sessionList.innerHTML = '';
    if (sessions.length === 0) {
      sessionList.innerHTML = '<div style="padding:10px 8px;font-size:12px;color:var(--t4)">暂无历史对话</div>';
      return;
    }
    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.sessionId === sessionId ? ' active' : '');
      item.dataset.id = s.sessionId;
      item.innerHTML = `
        <div class="si-title">${escHtml(s.preview || '（空会话）')}</div>
        <div class="si-time">${escHtml(formatRelativeTime(s.updatedAt))}</div>`;
      item.addEventListener('click', () => switchSession(s.sessionId));
      sessionList.appendChild(item);
    }
  } catch (e) { console.warn('loadSessionList failed', e); }
}

async function switchSession(id) {
  if (streaming) return;
  sessionId = id;
  msgWrap.innerHTML = '';
  setStatus('', '加载历史...');
  try {
    const res = await fetch(`/api/sessions/${id}/messages`);
    if (!res.ok) throw new Error('Failed');
    const json = await res.json();
    const msgs = Array.isArray(json.messages) ? json.messages : [];

    // Build tool_call_id → tool result message index for O(1) lookup
    const toolResults = {};
    for (const msg of msgs) {
      if (msg.role === 'tool' && msg.tool_call_id) {
        toolResults[msg.tool_call_id] = msg;
      }
    }

    let visibleCount = 0;
    let skipNextAssistantAck = false; // skip "Understood. I have the context..." after compact
    for (const msg of msgs) {
      // Skip internal system-reminder injections stored as user messages
      if (msg.role === 'user' && typeof msg.content === 'string'
          && msg.content.includes('<system-reminder>')) continue;
      // Compact tool result: show as Compact Card (legacy: tool message with _compact_summary)
      if (msg.role === 'tool' && typeof msg._compact_summary === 'string') {
        createCompactCard(msg._compact_summary, null);
        visibleCount++;
        continue;
      }
      // Skip other role="tool" — rendered as part of the assistant message below
      if (msg.role === 'tool') continue;

      // Compact summary user message: render as Compact Card, not user bubble
      if (msg.role === 'user' && typeof msg.content === 'string'
          && msg.content.startsWith('[Context was compacted.')) {
        const transcriptFile = msg._transcript_file || null;
        // Extract summary text between the markers
        const summaryMatch = msg.content.match(/\[Context was compacted\. Previous conversation summary:\]\n([\s\S]*?)\n\n\[Continue/);
        const summary = summaryMatch ? summaryMatch[1] : '';
        createCompactCard(summary, transcriptFile);
        skipNextAssistantAck = true; // next assistant message is the "Understood" ack
        visibleCount++;
        continue;
      }

      if (msg.role === 'user' && typeof msg.content === 'string') {
        appendUserBubble(msg.content);
        visibleCount++;

      } else if (msg.role === 'assistant') {
        const content         = (typeof msg.content === 'string') ? msg.content : '';
        const interleaved     = (typeof msg._content === 'string') ? msg._content : '';
        const reasoning       = (typeof msg._reasoning === 'string') ? msg._reasoning : '';
        const toolCalls       = Array.isArray(msg.tool_calls) ? msg.tool_calls : [];
        // Skip the "Understood. I have the context..." ack after compact
        if (skipNextAssistantAck && content.startsWith('Understood.') && toolCalls.length === 0) {
          skipNextAssistantAck = false;
          continue;
        }
        skipNextAssistantAck = false;
        if (!content && !interleaved && !reasoning && toolCalls.length === 0) continue;

        const aiBody = appendAiRow();
        visibleCount++;

        // Think block
        if (reasoning) {
          const durationMs = (typeof msg._reasoning_ms === 'number') ? msg._reasoning_ms : 0;
          const durationLabel = durationMs > 0
            ? `已思考 ${(durationMs / 1000).toFixed(1)}s`
            : '已思考';
          const block = document.createElement('div');
          block.className = 'think-block';
          block.innerHTML = thinkHeaderHtml(durationLabel);
          block.querySelector('.think-body').textContent = reasoning;
          aiBody.appendChild(block);
        }

        // Interleaved text: model sent text BEFORE tool_calls (preserved in _content)
        // Render it before tool blocks to match live streaming order
        if (interleaved) {
          const el = document.createElement('div');
          el.className = 'ai-text';
          el.innerHTML = renderMarkdown(interleaved);
          aiBody.appendChild(el);
        }

        // Tool call blocks
        for (const tc of toolCalls) {
          const tcId   = tc.id || '';
          const name   = (tc.function && tc.function.name) ? tc.function.name : '(unknown)';
          let   args   = {};
          try { args = JSON.parse((tc.function && tc.function.arguments) || '{}'); } catch(e) {}
          const resultMsg     = toolResults[tcId];
          // Prefer _display_content (full, pre-compression) over compressed content
          const resultContent = resultMsg
            ? (resultMsg._display_content || resultMsg.content || '')
            : '';
          const isCompressed  = resultMsg && !resultMsg._display_content
            && typeof resultMsg.content === 'string'
            && resultMsg.content.startsWith('[Previous:');

          // compact tool block stays collapsed (compact card already shown separately)
          const isCompactTool = (name === 'compact');
          const block = document.createElement('div');
          block.className = 'tool-block done';
          block.dataset.toolId = tcId;
          block.innerHTML = `
            <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
              <div class="tool-dot done"></div>
              <span class="tool-fn">${escHtml(name)}</span>
              <span class="tool-status"> · 完成</span>
              <span class="tool-toggle"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4l3 3 3-3"/></svg></span>
            </div>
            <div class="tool-body">
              <div class="tool-label in">Input</div>
              <div class="tool-code">${escHtml(JSON.stringify(args, null, 2))}</div>
              ${resultContent ? `<div class="tool-label out">Output${isCompressed ? ' (compressed)' : ''}</div><div class="tool-code">${escHtml(resultContent)}</div>` : ''}
            </div>`;
          aiBody.appendChild(block);
        }

        // Text reply (rendered as markdown)
        if (content) {
          const el = document.createElement('div');
          el.className = 'ai-text';
          el.innerHTML = renderMarkdown(content);
          aiBody.appendChild(el);
        }
      }
    }

    if (visibleCount === 0 && emptyState) {
      msgWrap.appendChild(emptyState);
      emptyState.style.display = '';
    }

    // Load teammate sessions associated with this lead session
    try {
      const tmRes = await fetch(`/api/sessions/${id}/teammates`);
      if (tmRes.ok) {
        const tms = await tmRes.json();
        if (Array.isArray(tms) && tms.length > 0) {
          // Build currentTeammateSessions for drawer
          for (const tm of tms) {
            currentTeammateSessions[tm.name] = tm.sessionId;
          }
          // Show a restore workspace card
          const tmCard = document.createElement('div');
          tmCard.className = 'tm-status-card';
          tmCard.style.marginTop = '8px';
          tmCard.innerHTML = `
            <div class="tm-dot done"></div>
            <span class="tm-name">Teammates</span>
            <span class="tm-status"> · ${tms.length} 个 agent 参与了本次对话</span>
            <span class="tm-count"></span>
            <button class="tm-btn visible" onclick="openDrawer('teammate',{agentId:'${escHtml(tms[0].name)}',sessionId:'${escHtml(tms[0].sessionId)}'})">查看工作区 →</button>`;
          msgWrap.appendChild(tmCard);
        }
      }
    } catch(e) { /* ignore teammate load errors */ }

  } catch (e) { console.warn('switchSession failed', e); }
  setStatus('', '');
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  scrollBottom();
}

function newConversation() {
  if (streaming) return;
  sessionId = null;
  msgWrap.innerHTML = '';
  if (emptyState) {
    msgWrap.appendChild(emptyState);
    emptyState.style.display = '';
  }
  setStatus('', '');
  Object.keys(currentTeammateSessions).forEach(k => delete currentTeammateSessions[k]);
  Object.keys(teammateMap).forEach(k => delete teammateMap[k]);
  closeDrawer();
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  msgInput.focus();
}

function formatRelativeTime(isoStr) {
  if (!isoStr) return '';
  const date = new Date(isoStr);
  if (isNaN(date.getTime())) return '';
  const diff = Date.now() - date.getTime();
  if (diff < 60000)    return '刚刚';
  if (diff < 3600000)  return Math.floor(diff / 60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
  return Math.floor(diff / 86400000) + ' 天前';
}

/* ── Init ── */
loadSessionList();
</script>
